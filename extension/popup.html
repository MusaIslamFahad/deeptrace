<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepTrace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f9fb;
      color: #111;
    }
    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .header-text h1 { font-size: 14px; font-weight: 700; }
    .header-text p  { font-size: 11px; opacity: 0.75; margin-top: 1px; }

    .section { padding: 14px 18px; border-bottom: 1px solid #eee; }
    .section:last-child { border-bottom: none; }
    label { font-size: 11px; font-weight: 600; color: #666;
            text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%; padding: 8px 10px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 12px; color: #111;
      background: white;
    }
    input[type="text"]:focus { outline: none; border-color: #6366f1; }

    .status-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #555;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ddd; flex-shrink: 0;
    }
    .dot.green  { background: #22c55e; }
    .dot.red    { background: #ef4444; }
    .dot.yellow { background: #f59e0b; }

    .btn {
      width: 100%; padding: 9px;
      border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-secondary { background: #eee; color: #333; }

    .footer {
      padding: 10px 18px;
      font-size: 10px; color: #aaa; text-align: center;
    }
    .footer a { color: #6366f1; text-decoration: none; }
    #save-feedback { font-size: 11px; color: #22c55e; display: none; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔍</div>
    <div class="header-text">
      <h1>DeepTrace</h1>
      <p>AI Image Provenance</p>
    </div>
  </div>

  <div class="section">
    <div class="status-row">
      <span class="dot" id="api-dot"></span>
      <span id="api-status">Checking API connection…</span>
    </div>
  </div>

  <div class="section">
    <label>API Key</label>
    <input type="text" id="api-key" placeholder="Your DeepTrace API key" />
    <div id="save-feedback">✓ Saved</div>
  </div>

  <div class="section">
    <label>API URL</label>
    <input type="text" id="api-base" placeholder="http://localhost:8000" />
  </div>

  <div class="section" style="display:flex;gap:8px;">
    <button class="btn btn-primary" id="save-btn">Save Settings</button>
    <button class="btn btn-secondary" id="test-btn">Test</button>
  </div>

  <div class="footer">
    Right-click any image → "Check with DeepTrace"<br/>
    <a href="https://github.com/yourusername/deeptrace" target="_blank">GitHub</a> ·
    <a href="http://localhost:8000/docs" target="_blank">API Docs</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
