# DeepTrace training parameters
# Tracked by DVC — changing any value invalidates downstream pipeline stages

data:
  root: data
  manifest_path: data/manifest.csv
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42

model:
  dropout: 0.3
  use_fft: true

training:
  batch_size: 32
  image_size: 224
  num_workers: 4
  label_smoothing: 0.1
  weight_decay: 0.01

  # Three-phase training schedule
  phase1_epochs: 10      # head only
  phase1_lr: 0.001

  phase2_epochs: 10      # top blocks unfrozen
  phase2_lr: 0.0002

  phase3_epochs: 20      # full fine-tune
  phase3_lr: 0.00005

mlflow:
  tracking_uri: http://localhost:5000
  experiment_name: DeepTrace
