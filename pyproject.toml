[tool.ruff]
target-version = "py311"
line-length = 100
select = ["E", "F", "W", "I", "N", "UP"]
ignore = [
    "E501",   # line too long (handled by formatter)
    "N806",   # variable in function should be lowercase
    "N812",   # lowercase imported as non-lowercase
]
exclude = [
    ".git", "__pycache__", ".venv",
    "frontend", "extension",
]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.coverage.run]
source = ["api", "model", "data", "workers", "monitoring"]
omit = [
    "tests/*",
    "scripts/*",
    "*/migrations/*",
    # Require real torch/GPU — tested locally, not in CI
    "api/services/inference.py",
    "api/services/inference_render.py",
]

[tool.coverage.report]
show_missing = true
fail_under = 60
